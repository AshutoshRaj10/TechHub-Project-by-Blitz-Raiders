version: '3.9'

services:
  # ── Backend — FastAPI + Zenith Engine ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    volumes:
      - backend_data:/app/uploads   # persist CSV uploads
      - ./backend/system_core.db:/app/system_core.db  # persist user/chat data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend — React + nginx ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In Docker: nginx proxies /api → backend:8000
        # So frontend just calls /api/* (same origin)
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
